<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cat Photo App</title>
  </head>

  <body>
    <!-- Build a Cat Photo App -->
    <main>
      <h1>Cat Photo App</h1>

      <!-- Section Cat Photos -->
      <section>
        <h2>Cat Photos</h2>
        <p>
          Everyone loves
          <a href="./images/01-cute-cat.jpg">cute cat</a> forever!
        </p>
        <p>
          See more
          <a
            href="https://freecatphotoapp.com"
            target="_blank"
            rel="noopener noreferrer"
            >cat photos</a
          >
          in our gallery
        </p>
        <a href="https://freecatphotoapp.com"
          ><img
            src="./images/02-cat-laydown.jpg"
            alt="A cute orange cat laying on its back"
            height="250"
        /></a>
      </section>

      <!-- Section Cat Lists -->
      <section>
        <h2>Cat Lists</h2>
        <h3>Things cats love:</h3>
        <ul>
          <li>catnip</li>
          <li>laser pointers</li>
          <li>lasagna</li>
        </ul>
        <figure>
          <img
            src="./images/03-slice-lasagna.jpg"
            alt="A slice of lasagna on a plate"
            height="200"
          />
          <figcaption>Cats <em>love</em> lasagna</figcaption>
        </figure>

        <h3>Top 3 things cats hate:</h3>
        <ol>
          <li>flea treatment</li>
          <li>thunder</li>
          <li>other cats</li>
        </ol>
        <figure>
          <img
            src="./images/04-two-cats-sleep.jpg"
            alt="Two cats sleeping together on sofa"
            height="200"
          />
          <figcaption>Cats <strong>hate</strong> other cats</figcaption>
        </figure>
      </section>
    </main>
  </body>
</html>
